<svg
  width="192"
  height="210"
  viewBox="0 0 192 210"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Card -->
  <rect
    x="1"
    y="1"
    width="190"
    height="208"
    rx="16"
    fill="#ffffff"
    stroke="#d6d3d1"
  />

  <!-- Header -->
  <rect
    x="1"
    y="1"
    width="190"
    height="32"
    fill="#f5f5f4"
    stroke="#d6d3d1"
  />

  <!-- Window dots -->
  <circle cx="16" cy="17" r="4" fill="#f87171" />
  <circle cx="28" cy="17" r="4" fill="#facc15" />
  <circle cx="40" cy="17" r="4" fill="#4ade80" />

  <!-- ===== Message Left ===== -->
  <!-- Avatar -->
  <circle cx="24" cy="68" r="12" fill="#d6d3d1" />

  <!-- Bubble -->
  <rect
    x="44"
    y="54"
    width="120"
    height="36"
    rx="10"
    fill="#e7e5e4"
  />

  <text
    x="52"
    y="68"
    font-size="8"
    fill="#57534e"
    font-family="Arial, sans-serif"
  >
    Assalamualaikum, kelas hari ini
  </text>
  <text
    x="52"
    y="78"
    font-size="8"
    fill="#57534e"
    font-family="Arial, sans-serif"
  >
    pukul berapa?
  </text>

  <!-- ===== Message Right ===== -->
  <!-- Avatar -->
  <circle cx="168" cy="132" r="12" fill="#17838F" opacity="0.25" />

  <!-- Bubble -->
  <rect
    x="28"
    y="118"
    width="120"
    height="44"
    rx="10"
    fill="#17838F"
  />

  <text
    x="36"
    y="132"
    font-size="8"
    fill="#ffffff"
    font-family="Arial, sans-serif"
  >
    Waalaikumussalam, kelas
  </text>
  <text
    x="36"
    y="142"
    font-size="8"
    fill="#ffffff"
    font-family="Arial, sans-serif"
  >
    bermula jam 8.00 malam.
  </text>
</svg>
