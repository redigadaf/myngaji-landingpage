<svg
  width="224"
  height="180"
  viewBox="0 0 224 180"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Card -->
  <rect
    x="1"
    y="1"
    width="222"
    height="178"
    rx="12"
    fill="#ffffff"
    stroke="#d6d3d1"
  />

  <!-- Chart area divider -->
  <line
    x1="16"
    y1="112"
    x2="208"
    y2="112"
    stroke="#d6d3d1"
  />

  <!-- Bars -->
  <!-- Bar 1 -->
  <rect
    x="24"
    y="72"
    width="40"
    height="40"
    fill="#17838F"
    opacity="0.3"
    rx="2"
  />

  <!-- Bar 2 -->
  <rect
    x="72"
    y="48"
    width="40"
    height="64"
    fill="#17838F"
    opacity="0.5"
    rx="2"
  />

  <!-- Bar 3 -->
  <rect
    x="120"
    y="60"
    width="40"
    height="52"
    fill="#17838F"
    opacity="0.4"
    rx="2"
  />

  <!-- Bar 4 (active) -->
  <rect
    x="168"
    y="24"
    width="40"
    height="88"
    fill="#17838F"
    rx="2"
  />

  <!-- Tooltip -->
  <rect
    x="162"
    y="4"
    width="52"
    height="18"
    rx="6"
    fill="#0f172a"
  />
  <text
    x="188"
    y="17"
    text-anchor="middle"
    font-size="10"
    fill="#ffffff"
    font-family="Arial, sans-serif"
  >
    98%
  </text>

  <!-- Legend -->
  <circle cx="24" cy="144" r="4" fill="#17838F" />
  <rect
    x="34"
    y="140"
    width="32"
    height="6"
    rx="3"
    fill="#e7e5e4"
  />
</svg>
