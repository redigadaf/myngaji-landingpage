<svg
  width="240"
  height="200"
  viewBox="0 0 240 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- ===== Column 1 ===== -->
  <g transform="translate(24, 40)">
    <!-- Circle -->
    <circle
      cx="24"
      cy="24"
      r="16"
      fill="#e7e5e4"
      stroke="#d6d3d1"
    />
    <!-- Bar -->
    <rect
      x="0"
      y="56"
      width="48"
      height="80"
      rx="12"
      fill="#e7e5e4"
      stroke="#d6d3d1"
    />
  </g>

  <!-- ===== Column 2 (active) ===== -->
  <g transform="translate(96, 24)">
    <!-- Circle -->
    <circle
      cx="28"
      cy="28"
      r="20"
      fill="#17838F"
      opacity="0.15"
      stroke="#17838F"
      stroke-opacity="0.25"
    />
    <!-- Bar -->
    <rect
      x="0"
      y="64"
      width="56"
      height="104"
      rx="14"
      fill="#17838F"
      opacity="0.1"
      stroke="#17838F"
      stroke-opacity="0.25"
    />
    <!-- Inner indicator -->
    <rect
      x="20"
      y="76"
      width="16"
      height="4"
      rx="2"
      fill="#17838F"
      opacity="0.25"
    />
  </g>

  <!-- ===== Column 3 ===== -->
  <g transform="translate(176, 8)">
    <!-- Circle -->
    <circle
      cx="32"
      cy="32"
      r="24"
      fill="#fafafa"
      stroke="#d6d3d1"
    />
    <!-- Bar -->
    <rect
      x="0"
      y="72"
      width="64"
      height="120"
      rx="16"
      fill="#fafafa"
      stroke="#d6d3d1"
    />
  </g>
</svg>
