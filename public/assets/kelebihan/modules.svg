<svg
  width="192"
  height="192"
  viewBox="0 0 192 192"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- ===== CARD SIZE ===== -->
  <!-- card: 84x84 | gap: 8 -->

  <!-- ===== Card 1 : Primary / Play ===== -->
  <rect x="8" y="8" width="84" height="84" rx="16" fill="#17838F" />
  <polygon points="42,34 42,58 60,46" fill="#ffffff" />
  <rect x="32" y="64" width="36" height="4" rx="2" fill="rgba(255,255,255,0.35)" />

  <!-- ===== Card 2 : Avatar ===== -->
  <rect
    x="100"
    y="8"
    width="84"
    height="84"
    rx="16"
    fill="#ffffff"
    stroke="#d6d3d1"
  />
  <circle cx="142" cy="40" r="14" fill="#e7e5e4" />
  <rect x="124" y="60" width="36" height="4" rx="2" fill="#d6d3d1" />

  <!-- ===== Card 3 : List ===== -->
  <rect
    x="8"
    y="100"
    width="84"
    height="84"
    rx="16"
    fill="#ffffff"
    stroke="#d6d3d1"
  />
  <rect x="28" y="128" width="40" height="6" rx="3" fill="#e7e5e4" />
  <rect x="28" y="140" width="40" height="6" rx="3" fill="#e7e5e4" />
  <rect x="28" y="152" width="24" height="6" rx="3" fill="#e7e5e4" />

  <!-- ===== Card 4 : Loader ===== -->
  <rect
    x="100"
    y="100"
    width="84"
    height="84"
    rx="16"
    fill="#fafafa"
    stroke="#d6d3d1"
  />
  <circle
    cx="142"
    cy="142"
    r="12"
    fill="none"
    stroke="#a8a29e"
    stroke-width="2"
  />
</svg>
