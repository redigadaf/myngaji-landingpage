<svg
  width="240"
  height="180"
  viewBox="0 0 240 180"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Card Background -->
  <rect
    x="30"
    y="26"
    width="180"
    height="128"
    rx="4"
    fill="#ffffff"
    stroke="#e7e5e4"
    stroke-width="2"
  />
  
  <!-- Content Container -->
  <g transform="translate(120, 26)">
    <!-- Icon Circle -->
    <circle cx="0" cy="24" r="16" fill="#17838F" fill-opacity="0.1" />
    
    <!-- Award Icon -->
    <g transform="translate(-12, 14)" stroke="#17838F" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="6" />
      <path d="M15.48 12.89 17 22l-5-3-5 3 1.52-9.11" />
    </g>

    <!-- Lines -->
    <rect x="-40" y="52" width="80" height="6" rx="3" fill="#292524" />
    <rect x="-50" y="62" width="100" height="4" rx="2" fill="#e7e5e4" />
  </g>

  <!-- Bottom Dashed Area -->
  <rect
    x="46"
    y="100"
    width="148"
    height="42"
    rx="4"
    fill="#fafaf9"
    stroke="#e7e5e4"
    stroke-width="1"
    stroke-dasharray="4 4"
  />

  <!-- Seal in Dashed Area -->
  <g transform="translate(120, 121)">
    <circle cx="0" cy="0" r="14" fill="#FACC15" fill-opacity="0.2" />
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FACC15" stroke-width="2" stroke-dasharray="3 3" />
  </g>
</svg>
